<div class="text-block" [ngStyle]="data.styles">
  @if (isEditing) {
    <!-- Text Editor -->
    <div class="inline-text-editor" (click)="$event.stopPropagation()">
      <div class="text-toolbar">
        <button type="button" (click)="formatText('bold')" class="toolbar-btn" title="Bold">
          <i class="fas fa-bold"></i>
        </button>
        <button type="button" (click)="formatText('italic')" class="toolbar-btn" title="Italic">
          <i class="fas fa-italic"></i>
        </button>
        <button type="button" (click)="formatText('underline')" class="toolbar-btn" title="Underline">
          <i class="fas fa-underline"></i>
        </button>
        <button type="button" (click)="formatText('createLink', promptForUrl())" class="toolbar-btn" title="Link">
          <i class="fas fa-link"></i>
        </button>
        <button class="btn btn-sm btn-primary" (click)="finishEditing()">Done</button>
      </div>
      <div 
        class="text-content-editor"
        contenteditable="true"
        [innerHTML]="data.content || ''"
        (input)="onTextInput($event)"
        (blur)="finishEditing()"
        #textEditor
        data-placeholder="Enter your text here..."
      ></div>
    </div>
  } @else {
    <div 
      class="text-content" 
      [innerHTML]="getDisplayContent()"
      (dblclick)="startEditing()"
    ></div>
  }
</div>
